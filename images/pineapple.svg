<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 52" fill="none">
  <!--
    Pineapple brand mark — Scott Breen / The Buddy Family
    Standalone version: explicit colours for use as favicon and standalone asset.
    For inline use in HTML, see the <symbol id="pineapple"> in index.html.

    Crown: 5 wider, natural leaf shapes in rich greens
    Body:  pineapple gold (#C8901A) with depth shading, highlight, and scale texture
  -->

  <!-- Crown — 5 leaves fanning upward (explicitly green) -->
  <!-- Far left fan leaf -->
  <path d="M11 19 C9.5 16 8.5 12.5 9 10 C11.5 12 14 15.5 17 19Z" fill="#2D7A52"/>
  <!-- Left diagonal leaf -->
  <path d="M14 19 C13.5 13.5 14 8 15.5 4 C17.5 8 18 14 19.5 19Z" fill="#2E7050"/>
  <!-- Centre leaf (tallest) -->
  <path d="M17 19 C17.5 12 19 5 20 1.5 C21 5 22.5 12 23 19Z" fill="#357A44"/>
  <!-- Right diagonal leaf -->
  <path d="M26 19 C26.5 13.5 26 8 24.5 4 C22.5 8 22 14 20.5 19Z" fill="#2E7050"/>
  <!-- Far right fan leaf -->
  <path d="M29 19 C30.5 16 31.5 12.5 31 10 C28.5 12 26 15.5 23 19Z" fill="#2D7A52"/>

  <!-- Body — gold ellipse with texture -->
  <ellipse cx="20" cy="34" rx="12" ry="16" fill="#C8901A" opacity="0.93"/>
  <!-- Depth shading — darker towards bottom -->
  <ellipse cx="20" cy="42" rx="9" ry="8" fill="#C8901A" opacity="0.2"/>
  <!-- Highlight — upper left shine -->
  <ellipse cx="15.5" cy="26" rx="4" ry="3.5" fill="white" opacity="0.14" transform="rotate(-20 15.5 26)"/>
  <!-- Scale texture — horizontal arcs (rows of scales) -->
  <path d="M9.5 28 Q20 25.5 30.5 28" stroke="#9B7210" stroke-width="0.55" fill="none" opacity="0.35"/>
  <path d="M8.5 34 Q20 31.5 31.5 34" stroke="#9B7210" stroke-width="0.55" fill="none" opacity="0.35"/>
  <path d="M9.5 40 Q20 37.5 30.5 40" stroke="#9B7210" stroke-width="0.55" fill="none" opacity="0.35"/>
  <path d="M12.5 46 Q20 43.5 27.5 46" stroke="#9B7210" stroke-width="0.55" fill="none" opacity="0.28"/>
  <!-- Scale texture — vertical arcs (columns of scales) -->
  <path d="M13.5 20.5 Q13 34 14.5 47.5" stroke="#9B7210" stroke-width="0.55" fill="none" opacity="0.28"/>
  <path d="M17 18.5 Q16.5 34 17.5 49.5" stroke="#9B7210" stroke-width="0.55" fill="none" opacity="0.28"/>
  <path d="M20 18 Q20.5 34 20 50" stroke="#9B7210" stroke-width="0.55" fill="none" opacity="0.28"/>
  <path d="M23 18.5 Q23.5 34 22.5 49.5" stroke="#9B7210" stroke-width="0.55" fill="none" opacity="0.28"/>
  <path d="M26.5 20.5 Q27 34 25.5 47.5" stroke="#9B7210" stroke-width="0.55" fill="none" opacity="0.28"/>
</svg>
